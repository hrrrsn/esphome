packages:
  base: !include ../config/base.yaml
  wifi: !include ../config/wifi.yaml
  bleproxy: !include ../config/bleproxy.yaml

substitutions:
  devicename: "m5stack-atoms3-lite"
  friendly_name: "M5Stack ATOM S3 Lite"
  device_comment: "M5Stack ATOM S3 Lite - BLE Proxy"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  comment: ${device_comment}
  name_add_mac_suffix: true

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:
  baud_rate: 0

light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    pin: GPIO35
    num_leds: 4
    rgb_order: GRB
    id: status_led
    name: "LED"
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 1s
          update_interval: 1s

binary_sensor:
  - platform: gpio
    name: "Button"
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms

