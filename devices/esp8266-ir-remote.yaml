# https://www.aliexpress.com/item/1005009492237885.html

packages:
  base: !include ../config/base.yaml
  wifi: !include ../config/wifi.yaml

substitutions:
  name: lounge-ac
  friendly_name: "Lounge AC"
  device_description: "Mitsubishi Heavy Industries SRK50ZSA-W"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  name_add_mac_suffix: true

esp8266:
  board: esp8285

status_led:
  pin:
    number: GPIO13
    inverted: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    disabled_by_default: true

remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%

climate:
  - platform: heatpumpir
    name: "Heat Pump"
    protocol: mitsubishi_heavy_zj
    horizontal_default: middle
    vertical_default: auto
    min_temperature: 16
    max_temperature: 30
    visual:
      min_temperature: 16
      max_temperature: 30
      temperature_step: 1
